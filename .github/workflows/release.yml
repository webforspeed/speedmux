name: Release

# Trigger:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Produces GitHub Release assets:
# - speedmux_<version>_linux_amd64.tar.gz
# - speedmux_<version>_linux_arm64.tar.gz
# - speedmux_<version>_darwin_amd64.tar.gz
# - speedmux_<version>_darwin_arm64.tar.gz
# - checksums.txt
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archive
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          artifact="speedmux_${version}_${GOOS}_${GOARCH}"
          mkdir -p dist

          go build -trimpath -ldflags="-s -w -X main.version=${TAG}" -o dist/speedmux .
          tar -C dist -czf "dist/${artifact}.tar.gz" speedmux
          rm -f dist/speedmux

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
